name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lint tools
        run: pip install black==24.3.0 isort flake8
      - name: Black
        run: black --check --diff .
      - name: isort
        run: isort --check-only --diff .
      - name: flake8
        run: flake8 .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          pip install pytest dnspython msgspec aiohttp
          # Skip PySide6 and scrapling — tests target pure-Python logic only
      - name: Run tests
        run: pytest tests/ -v
